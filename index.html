<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChantierPro - Outils Pro</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffb703;
            --text-color: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: var(--card-bg); border-radius: 12px; border-bottom: 4px solid var(--accent-color); box-shadow: var(--shadow); }
        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid #333; }
        h3 { color: var(--accent-color); margin-top: 0; font-size: 1.2rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { width: 100%; padding: 14px; background: var(--accent-color); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 15px; padding: 15px; background: #252525; border-left: 4px solid var(--accent-color); display: none; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>👷‍♂️ CHANTIERPRO</h1></header>

    <!-- Calculateur Revêtement -->
    <div class="card">
        <h3>📐 Revêtement (avec ouvertures)</h3>
        <input type="number" id="w" placeholder="Largeur mur (m)">
        <input type="number" id="h" placeholder="Hauteur mur (m)">
        <input type="number" id="doors" placeholder="Nb portes">
        <input type="number" id="windows" placeholder="Nb fenêtres">
        <button onclick="calcRev()">Calculer Surface</button>
        <div id="resRev" class="result-box">Surface nette : <span id="valRev">0</span> m²</div>
    </div>

    <!-- Calculateur Béton -->
    <div class="card">
        <h3>🏗️ Calculateur Béton</h3>
        <input type="number" id="vol" placeholder="Volume en m3">
        <button onclick="calcBeton()">Calculer Sacs (35kg)</button>
        <div id="resBeton" class="result-box">Nombre de sacs : <span id="valBeton">0</span></div>
    </div>

    <!-- Calculateur Parpaings -->
    <div class="card">
        <h3>🧱 Calculateur Parpaings</h3>
        <input type="number" id="surfMur" placeholder="Surface totale mur (m²)">
        <button onclick="calcParp()">Calculer Parpaings</button>
        <div id="resParp" class="result-box">Nombre de parpaings : <span id="valParp">0</span></div>
    </div>
</div>

<script>
    function calcRev() {
        const w = parseFloat(document.getElementById('w').value) || 0;
        const h = parseFloat(document.getElementById('h').value) || 0;
        const d = parseFloat(document.getElementById('doors').value) || 0;
        const f = parseFloat(document.getElementById('windows').value) || 0;
        let s = (w * h) - (d * 2) - (f * 1.5);
        document.getElementById('valRev').innerText = (s < 0 ? 0 : s).toFixed(2);
        document.getElementById('resRev').style.display = 'block';
    }

    function calcBeton() {
        const v = parseFloat(document.getElementById('vol').value) || 0;
        // 1m3 = environ 55-60 sacs de 35kg
        document.getElementById('valBeton').innerText = Math.ceil(v * 58);
        document.getElementById('resBeton').style.display = 'block';
    }

    function calcParp() {
        const s = parseFloat(document.getElementById('surfMur').value) || 0;
        // 1m2 = 10 parpaings standard 20x20x50
        document.getElementById('valParp').innerText = Math.ceil(s * 10);
        document.getElementById('resParp').style.display = 'block';
    }
</script>

</body>
</html>
