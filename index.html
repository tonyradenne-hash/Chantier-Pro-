<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChantierPro - Premium</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffb703; /* Le jaune */
            --text-color: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border-bottom: 4px solid var(--accent-color);
            box-shadow: var(--shadow);
        }

        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid #333;
        }

        h3 { color: var(--accent-color); margin-top: 0; font-size: 1.2rem; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            display: none;
        }

        .checkbox-item { display: flex; align-items: center; margin: 12px 0; font-size: 1rem; cursor: pointer; }
        .checkbox-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--accent-color); }
        
        .shop-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-shop { background: #27ae60; color: white; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>👷‍♂️ CHANTIERPRO</h1></header>

    <!-- Checklist -->
    <div class="card">
        <h3>📋 Checklist Démarrage</h3>
        <label class="checkbox-item"><input type="checkbox"> Eau/Élec repérées</label>
        <label class="checkbox-item"><input type="checkbox"> Photos avant travaux</label>
        <label class="checkbox-item"><input type="checkbox"> EPI dans le camion</label>
        <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false)" style="background:#444; color:white;">🔄 Réinitialiser</button>
    </div>

    <!-- Mémo -->
    <div class="card">
        <h3>📝 Mémo de Poche</h3>
        <textarea id="memo" rows="4" placeholder="Notes, dimensions, codes..." oninput="saveMemo()"></textarea>
    </div>

    <!-- Calculateur -->
    <div class="card">
        <h3>📐 Calculateur Surface</h3>
        <input type="number" id="w" placeholder="Largeur (m)">
        <input type="number" id="h" placeholder="Hauteur (m)">
        <button onclick="calc()">Calculer</button>
        <div id="res" class="result-box">Surface nette : <span id="val">0</span> m²</div>
    </div>
</div>

<script>
    window.onload = () => document.getElementById('memo').value = localStorage.getItem('proMemo') || '';
    const saveMemo = () => localStorage.setItem('proMemo', document.getElementById('memo').value);
    
    function calc() {
        const res = document.getElementById('w').value * document.getElementById('h').value;
        document.getElementById('val').innerText = res.toFixed(2);
        document.getElementById('res').style.display = 'block';
    }
</script>

</body>
</html>
