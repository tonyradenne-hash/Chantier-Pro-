<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChantierPro - Outils & Gestion</title>
    <style>
        :root { --primary-dark: #1d1d1d; --brand-yellow: #ffb703; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: var(--text); padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 20px; background: var(--primary-dark); border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        header h1 { color: var(--brand-yellow); }
        .card { background: var(--primary-dark); border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h3 { color: var(--brand-yellow); margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { width: 100%; padding: 12px; background: var(--brand-yellow); border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 15px; padding: 15px; background: #252525; border-left: 4px solid var(--brand-yellow); display: none; }
        .checkbox-item { display: flex; align-items: center; margin: 10px 0; font-size: 0.95rem; }
        .checkbox-item input { width: 20px; height: 20px; margin-right: 12px; }
        .shop-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-shop { background: #27ae60; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>👷‍♂️ CHANTIERPRO</h1></header>

    <!-- MODULES GESTION -->
    <div class="card">
        <h3>📋 Checklist Démarrage</h3>
        <label class="checkbox-item"><input type="checkbox"> Eau/Élec repérées</label>
        <label class="checkbox-item"><input type="checkbox"> Photos avant travaux</label>
        <label class="checkbox-item"><input type="checkbox"> EPI présents</label>
        <button onclick="document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false)">🔄 Réinitialiser</button>
    </div>

    <div class="card">
        <h3>📝 Mémo de Poche</h3>
        <textarea id="memo" rows="4" placeholder="Notes, dimensions, codes..." oninput="saveMemo()"></textarea>
    </div>

    <!-- CALCULATEURS -->
    <div class="card">
        <h3>📐 Calculateur Revêtement</h3>
        <input type="number" id="w" placeholder="Largeur (m)">
        <input type="number" id="h" placeholder="Hauteur (m)">
        <button onclick="calc()">Calculer Surface</button>
        <div id="res" class="result-box">Surface nette : <span id="val">0</span> m²</div>
    </div>

    <!-- BOUTIQUE -->
    <div class="card">
        <h3>💼 Catalogue Pro</h3>
        <div class="shop-item"><span>Modèle Devis Auto</span><a href="#" class="btn-shop">14.90 €</a></div>
        <div class="shop-item"><span>Trame Facture</span><a href="#" class="btn-shop">9.90 €</a></div>
    </div>
</div>

<script>
    // Sauvegarde auto mémo
    window.onload = () => document.getElementById('memo').value = localStorage.getItem('proMemo') || '';
    const saveMemo = () => localStorage.setItem('proMemo', document.getElementById('memo').value);
    
    // Calcul simple
    function calc() {
        const res = document.getElementById('w').value * document.getElementById('h').value;
        document.getElementById('val').innerText = res.toFixed(2);
        document.getElementById('res').style.display = 'block';
    }
</script>

</body>
</html>
